name: vitalmap
description: VitalMap - organ health risk indicator (Flutter frontend)
publish_to: 'none'
version: 0.1.0
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^0.13.5
  shared_preferences: ^2.0.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.10.0
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/logo_medid.jpeg

# Configuration for flutter_launcher_icons
flutter_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/logo_medid.jpeg"
    background_color: "#FFFFFF"
    theme_color: "#0B63CE"
  image_path: "assets/logo_medid.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo_medid.jpeg"
